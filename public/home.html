<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lulu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="home-body">
    <div class="page-shell home-shell">
      <div class="home-topbar">
        <div class="header-side right-side">
          <div class="language-switcher" aria-label="Language switcher">
            <span class="language-icon" aria-hidden="true">L</span>
            <select id="languageSwitcher">
              <option value="en">English</option>
              <option value="zh">中文</option>
              <option value="sw">Kiswahili</option>
            </select>
          </div>
        </div>
      </div>

      <main class="home-main home-main-simple">
        <section class="home-categories section" id="categories">
          <div id="categoryGrid" class="category-grid"></div>
        </section>
      </main>
    </div>

    <script type="module" src="/home.js"></script>
  </body>
</html>
